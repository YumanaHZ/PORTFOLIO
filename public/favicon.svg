<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient for a modern neon look -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa" /> <!-- Violet 400 -->
      <stop offset="100%" stop-color="#7c3aed" /> <!-- Violet 600 -->
    </linearGradient>
    
    <!-- Outer Glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background base -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="#060911" />
  
  <!-- Subtle inner border -->
  <rect x="24" y="24" width="464" height="464" rx="120" fill="none" stroke="#27272a" stroke-width="8" />

  <!-- "YY" Typographic Logo -->
  <g transform="translate(110, 360)" fill="url(#neonGradient)" filter="url(#glow)">
    <path d="M125.6-212.8L63.2-12.8H21.6l44.8-132.8L-2-212.8h41.6L79.2-164l38.4-48.8h40zM250.4-212.8l-62.4,200h-41.6l44.8-132.8L124.8-212.8h41.6l40,48.8l38.4-48.8h39.2z" />
  </g>
</svg>
