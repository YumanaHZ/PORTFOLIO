<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1a0a"/>
      <stop offset="100%" stop-color="#062010"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#39ff14" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#39ff14" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <rect x="28" y="28" width="456" height="456" rx="108" fill="none" stroke="#39ff14" stroke-width="3" opacity="0.15"/>

  <line x1="80" y1="140" x2="80" y2="380" stroke="#39ff14" stroke-width="2" opacity="0.08"/>
  <line x1="160" y1="100" x2="160" y2="420" stroke="#39ff14" stroke-width="2" opacity="0.08"/>
  <line x1="240" y1="100" x2="240" y2="420" stroke="#39ff14" stroke-width="2" opacity="0.08"/>
  <line x1="320" y1="100" x2="320" y2="420" stroke="#39ff14" stroke-width="2" opacity="0.08"/>
  <line x1="400" y1="140" x2="400" y2="380" stroke="#39ff14" stroke-width="2" opacity="0.08"/>
  <line x1="80" y1="200" x2="440" y2="200" stroke="#39ff14" stroke-width="2" opacity="0.06"/>
  <line x1="80" y1="320" x2="440" y2="320" stroke="#39ff14" stroke-width="2" opacity="0.06"/>

  <g filter="url(#neonGlow)">
    <text x="256" y="310" text-anchor="middle" font-family="monospace, 'Courier New'" font-weight="900" font-size="260" fill="#39ff14" letter-spacing="-15">
      Y
    </text>
  </g>

  <text x="110" y="200" font-family="monospace, 'Courier New'" font-size="42" fill="#39ff14" opacity="0.4" filter="url(#softGlow)">
    &gt;_
  </text>

  <circle cx="400" cy="400" r="6" fill="#39ff14" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
